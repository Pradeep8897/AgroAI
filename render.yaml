services:
  # 1. Private MySQL Database Service
  - type: pservice
    name: mysql
    image:
      url: docker.io/library/mysql:8.0
    envVars:
      - key: MYSQL_DATABASE
        value: agroai
      - key: MYSQL_USER
        value: agroai_user
      - key: MYSQL_PASSWORD
        value: agroai_pass
      - key: MYSQL_ROOT_PASSWORD
        value: agroai_root_pass

  # 2. AgroAI Python Flask Backend Web Service
  - type: web
    name: agroai-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app
    envVars:
      - key: USE_MYSQL
        value: "true"
      - key: DB_HOST
        value: mysql
      - key: DB_USER
        value: agroai_user
      - key: DB_PASSWORD
        value: agroai_pass
      - key: DB_NAME
        value: agroai
